name: Build and release small Tailscale

on:
  workflow_dispatch:
    inputs:
      tailscale_ref:
        description: Tailscale tag, branch or commit to build
        required: true
        default: v1.98.8
      release_tag:
        description: Release tag to create; leave empty to build artifacts only
        required: false
        default: ""
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - .github/workflows/build_small_tailscale.yml
      - installer/**
      - router/**
      - README.md
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  DEFAULT_TAILSCALE_REF: v1.98.8
  UPX_VERSION: 5.2.0
  UPX_AMD64_SHA256: 3db5d3294707439db97866feab8d75d800f028f48481a40547411824da4288a1

jobs:
  build:
    name: ${{ matrix.target }} softfloat
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: mips
            binary_name: tailscaled-linux-mips-softfloat
            goarch: mips
            goarm: ""
            endian: MSB
            elf_bits: 32-bit
            file_machine: MIPS
            gomips: softfloat
            gomips64: ""
            float_key: GOMIPS
            upx: true
            qemu: qemu-mips-static
          - target: mipsle
            binary_name: tailscaled-linux-mipsle-softfloat
            goarch: mipsle
            goarm: ""
            endian: LSB
            elf_bits: 32-bit
            file_machine: MIPS
            gomips: softfloat
            gomips64: ""
            float_key: GOMIPS
            upx: true
            qemu: qemu-mipsel-static
          - target: mips64
            binary_name: tailscaled-linux-mips64-softfloat
            goarch: mips64
            goarm: ""
            endian: MSB
            elf_bits: 64-bit
            file_machine: MIPS
            gomips: ""
            gomips64: softfloat
            float_key: GOMIPS64
            upx: false
            qemu: qemu-mips64-static
          - target: mips64le
            binary_name: tailscaled-linux-mips64le-softfloat
            goarch: mips64le
            goarm: ""
            endian: LSB
            elf_bits: 64-bit
            file_machine: MIPS
            gomips: ""
            gomips64: softfloat
            float_key: GOMIPS64
            upx: false
            qemu: qemu-mips64el-static
          - target: arm5
            binary_name: tailscaled-linux-armv5
            goarch: arm
            goarm: "5"
            endian: LSB
            elf_bits: 32-bit
            file_machine: ARM
            gomips: ""
            gomips64: ""
            float_key: ""
            upx: true
            qemu: qemu-arm-static
          - target: arm7
            binary_name: tailscaled-linux-armv7
            goarch: arm
            goarm: "7"
            endian: LSB
            elf_bits: 32-bit
            file_machine: ARM
            gomips: ""
            gomips64: ""
            float_key: ""
            upx: true
            qemu: qemu-arm-static
    env:
      BINARY_NAME: ${{ matrix.binary_name }}

    steps:
      - name: Checkout enabler
        uses: actions/checkout@v4

      - name: Resolve Tailscale ref
        id: ref
        shell: bash
        env:
          INPUT_REF: ${{ inputs.tailscale_ref }}
        run: |
          set -euo pipefail
          if [[ -n "$INPUT_REF" ]]; then
            ref="$INPUT_REF"
          elif [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            ref="$GITHUB_REF_NAME"
          else
            ref="$DEFAULT_TAILSCALE_REF"
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Checkout Tailscale source
        shell: bash
        run: |
          set -euo pipefail
          git init tailscale
          git -C tailscale remote add origin https://github.com/tailscale/tailscale.git
          git -C tailscale fetch --depth 1 origin "${{ steps.ref.outputs.ref }}"
          git -C tailscale checkout --detach FETCH_HEAD

      - name: Set up Go from Tailscale go.mod
        uses: actions/setup-go@v5
        with:
          go-version-file: tailscale/go.mod
          cache-dependency-path: tailscale/go.sum

      - name: Build minimal combined binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cd tailscale

          version_short="$(tr -d '\r\n' < VERSION.txt)"
          version_hash="$(git rev-parse --short HEAD)"
          version_long="${version_short}-enabler-${version_hash}"
          features="cli,ssh,advertiseexitnode,advertiseroutes,osrouter,iptables,bakedroots,cachenetmap,portmapper,listenrawdisco,unixsocketidentity,ipnbus,tailnetlock"
          tags="$(env -u GOOS -u GOARCH -u GOARM -u GOMIPS -u GOMIPS64 go run ./cmd/featuretags --min --add="$features")"
          printf '%s\n' "$tags" > "../dist/build-tags-${{ matrix.target }}.txt"

          for required in ssh advertiseexitnode advertiseroutes netstack osrouter iptables unixsocketidentity ipnbus tailnetlock; do
            if [[ ",$tags," == *",ts_omit_${required},"* ]]; then
              echo "Required feature was omitted: $required" >&2
              exit 1
            fi
          done
          [[ ",$tags," == *",ts_include_cli,"* ]]

          build_env=(
            CGO_ENABLED=0
            GOOS=linux
            GOARCH=${{ matrix.goarch }}
          )
          if [[ -n "${{ matrix.goarm }}" ]]; then
            build_env+=(GOARM=${{ matrix.goarm }})
          fi
          if [[ -n "${{ matrix.gomips }}" ]]; then
            build_env+=(GOMIPS=${{ matrix.gomips }})
          fi
          if [[ -n "${{ matrix.gomips64 }}" ]]; then
            build_env+=(GOMIPS64=${{ matrix.gomips64 }})
          fi

          env "${build_env[@]}" go build \
            -trimpath \
            -tags "$tags" \
            -ldflags "-s -w -buildid= -X tailscale.com/version.longStamp=${version_long} -X tailscale.com/version.shortStamp=${version_short}" \
            -o "../dist/${BINARY_NAME}" \
            ./cmd/tailscaled

          cd ..
          chmod 755 "dist/${BINARY_NAME}"

      - name: Inspect uncompressed binary
        shell: bash
        run: |
          set -euo pipefail
          binary="dist/${BINARY_NAME}"
          file_output="$(file "$binary")"
          build_info="$(go version -m "$binary")"

          printf '%s\n' "$file_output"
          printf '%s\n' "$build_info"
          grep -Fq "ELF ${{ matrix.elf_bits }} ${{ matrix.endian }} executable, ${{ matrix.file_machine }}" <<<"$file_output"
          grep -Fq "statically linked" <<<"$file_output"
          grep -Fq $'build\tCGO_ENABLED=0' <<<"$build_info"
          grep -Fq $'build\tGOARCH=${{ matrix.goarch }}' <<<"$build_info"
          if [[ -n "${{ matrix.float_key }}" ]]; then
            grep -Fq $'build\t${{ matrix.float_key }}=softfloat' <<<"$build_info"
          fi
          if [[ -n "${{ matrix.goarm }}" ]]; then
            grep -Fq $'build\tGOARM=${{ matrix.goarm }}' <<<"$build_info"
          fi

      - name: Install pinned UPX for the GitHub runner
        if: matrix.upx
        shell: bash
        run: |
          set -euo pipefail
          archive="upx-${UPX_VERSION}-amd64_linux.tar.xz"
          url="https://github.com/upx/upx/releases/download/v${UPX_VERSION}/${archive}"
          curl -fsSL "$url" -o "/tmp/$archive"
          echo "${UPX_AMD64_SHA256}  /tmp/$archive" | sha256sum -c -
          tar -xJf "/tmp/$archive" -C /tmp
          sudo install -m 0755 "/tmp/upx-${UPX_VERSION}-amd64_linux/upx" /usr/local/bin/upx
          upx --version

      - name: Create maximum-compression UPX variant
        if: matrix.upx
        shell: bash
        run: |
          set -euo pipefail
          cp "dist/${BINARY_NAME}" "dist/${BINARY_NAME}-upx"
          upx --best --lzma "dist/${BINARY_NAME}-upx"
          upx -t "dist/${BINARY_NAME}-upx"
          chmod 755 "dist/${BINARY_NAME}-upx"

      - name: Test plain and UPX binaries with QEMU
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends qemu-user-static

          expected_version="$(tr -d '\r\n' < tailscale/VERSION.txt)"
          upx_suffixes=""
          if [[ "${{ matrix.upx }}" == "true" ]]; then
            upx_suffixes="-upx"
          fi
          for suffix in "" $upx_suffixes; do
            binary="dist/${BINARY_NAME}${suffix}"
            label="${{ matrix.target }}${suffix}"
            daemon_version="$(timeout 30s ${{ matrix.qemu }} "$binary" --version | sed -n '1p')"
            cli_version="$(TS_BE_CLI=1 timeout 30s ${{ matrix.qemu }} "$binary" version | sed -n '1p')"
            TS_BE_CLI=1 timeout 30s ${{ matrix.qemu }} "$binary" up --help > "dist/up-help-${label}.txt" 2>&1
            TS_BE_CLI=1 timeout 30s ${{ matrix.qemu }} "$binary" lock --help > "dist/lock-help-${label}.txt" 2>&1

            test "$daemon_version" = "$expected_version"
            test "$cli_version" = "$expected_version"
            grep -Fq -- "--auth-key" "dist/up-help-${label}.txt"
            grep -Fq -- "--ssh" "dist/up-help-${label}.txt"
            grep -Fq -- "--advertise-exit-node" "dist/up-help-${label}.txt"
            grep -Fq -- "--advertise-routes" "dist/up-help-${label}.txt"
            grep -Fq -- "--netfilter-mode" "dist/up-help-${label}.txt"
            grep -Fq -- "tailscale lock" "dist/lock-help-${label}.txt"
            printf '%s: daemon and embedded CLI tests passed\n' "$label"
          done

      - name: Write checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum "$BINARY_NAME" > "$BINARY_NAME.sha256"
          if [[ -f "$BINARY_NAME-upx" ]]; then
            sha256sum "$BINARY_NAME-upx" > "$BINARY_NAME-upx.sha256"
          fi
          ls -lh "$BINARY_NAME" "$BINARY_NAME"-upx 2>/dev/null || ls -lh "$BINARY_NAME"
          cat "$BINARY_NAME".sha256 "$BINARY_NAME"-upx.sha256 2>/dev/null || cat "$BINARY_NAME.sha256"

      - name: Upload target artifact
        uses: actions/upload-artifact@v4
        with:
          name: tailscale-${{ matrix.target }}
          path: dist/
          if-no-files-found: error

  package:
    name: Assemble release payload
    runs-on: ubuntu-24.04
    needs: build
    env:
      INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
    steps:
      - name: Checkout enabler
        uses: actions/checkout@v4

      - name: Download tested binaries
        uses: actions/download-artifact@v4
        with:
          pattern: tailscale-*
          path: build-output
          merge-multiple: true

      - name: Test portable installer
        shell: bash
        run: sh tests/test-installer.sh

      - name: Assemble file payload
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            release_tag="$GITHUB_REF_NAME"
          else
            release_tag="$INPUT_RELEASE_TAG"
          fi
          if [[ -n "$release_tag" ]]; then
            https_base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${release_tag}"
          else
            https_base="https://github.com/${GITHUB_REPOSITORY}/releases/latest/download"
          fi

          mkdir -p dist-release
          find build-output -maxdepth 1 -type f -name 'tailscaled-linux-*' -exec cp {} dist-release/ \;
          cp router/tailscale router/tailscale-init router/tailscale-boot router/tailscale-openwrt-init dist-release/
          cp README.md dist-release/README.vi.md
          sed \
            -e "s|__DEFAULT_BASE_URL__|${https_base}|g" \
            -e "s|__INSTALLER_FILE__|install-https.sh|g" \
            installer/install.sh > dist-release/install-https.sh
          sed \
            -e "s|__DEFAULT_BASE_URL__||g" \
            -e "s|__INSTALLER_FILE__|install-http.sh|g" \
            installer/install.sh > dist-release/install-http.sh
          chmod 755 dist-release/tailscale dist-release/tailscale-init \
            dist-release/tailscale-boot dist-release/tailscale-openwrt-init \
            dist-release/install-https.sh dist-release/install-http.sh \
            dist-release/tailscaled-linux-*

          ! grep -R "__DEFAULT_BASE_URL__\|__INSTALLER_FILE__" dist-release
          for script in dist-release/tailscale dist-release/tailscale-init \
            dist-release/tailscale-boot dist-release/tailscale-openwrt-init \
            dist-release/install-https.sh dist-release/install-http.sh; do
            sh -n "$script"
          done

          cd dist-release
          find . -maxdepth 1 -type f ! -name SHA256SUMS -printf '%f\n' \
            | sort | xargs sha256sum > SHA256SUMS
          for checksum in tailscaled-linux-*.sha256; do
            sha256sum -c "$checksum"
          done
          find . -maxdepth 1 -type f -printf '%f\n' | sort

      - name: Upload complete payload
        uses: actions/upload-artifact@v4
        with:
          name: tailscale-release-files
          path: dist-release/
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-24.04
    needs: package
    if: github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
    steps:
      - name: Download complete payload
        uses: actions/download-artifact@v4
        with:
          name: tailscale-release-files
          path: dist-release

      - name: Create or update release
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            tag="$GITHUB_REF_NAME"
          else
            tag="$INPUT_RELEASE_TAG"
          fi

          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$tag" dist-release/* --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$tag" dist-release/* \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "Small Tailscale $tag" \
              --notes "Bản tối giản cho router Linux MIPS/ARM, gồm binary thường và UPX khi nền tảng hỗ trợ."
          fi
